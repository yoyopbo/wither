<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>~~*AZMYTH'S WITHER REPORT*~~</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Orbitron', 'Impact', 'Comic Sans MS', monospace;
      min-height: 100vh;
      background-color: #ccff00;
      background-image:
        radial-gradient(circle, #00dd00 1px, transparent 1px),
        radial-gradient(circle, #ffff00 1px, transparent 1px);
      background-size: 30px 30px, 60px 60px;
      background-position: 0 0, 15px 15px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 12px 30px;
      position: relative;
      overflow-x: hidden;
    }

    /* Scrolling marquee banner */
    .marquee-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 32px;
      background: linear-gradient(90deg, #ff0080, #ff6600, #ffff00, #00ff00, #0080ff, #8000ff, #ff0080);
      background-size: 400% 100%;
      animation: rainbowBg 3s linear infinite;
      z-index: 100;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    @keyframes rainbowBg {
      from { background-position: 0% 50%; }
      to   { background-position: 400% 50%; }
    }

    .marquee-inner {
      display: flex;
      white-space: nowrap;
      will-change: transform;
    }

    @keyframes marqueeScroll {
      from { transform: translateX(100vw); }
      to   { transform: translateX(-100%); }
    }

    .marquee-text {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      color: #000;
      letter-spacing: 0.2em;
      padding: 0 2rem;
    }

    /* Main card wrapper */
    .card-outer {
      margin-top: 48px;
      max-width: 480px;
      width: 100%;
      position: relative;
    }

    /* Rainbow gradient border trick */
    .card-border {
      padding: 5px;
      border-radius: 8px;
      background: repeating-linear-gradient(
        45deg,
        #ff0080 0px, #ff0080 10px,
        #ff6600 10px, #ff6600 20px,
        #ffff00 20px, #ffff00 30px,
        #00ff00 30px, #00ff00 40px,
        #0080ff 40px, #0080ff 50px,
        #8000ff 50px, #8000ff 60px
      );
      animation: borderShift 1.5s linear infinite;
      box-shadow:
        0 0 20px #ff0080,
        0 0 40px #ff6600,
        inset 0 0 20px rgba(0,255,0,0.1);
    }

    @keyframes borderShift {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    /* Inner card */
    .card {
      background: #000011;
      border-radius: 4px;
      padding: 1.8rem 1.6rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Scanline effect */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,255,0,0.025) 2px,
        rgba(0,255,0,0.025) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .card > * { position: relative; z-index: 2; }

    /* Title block */
    .site-title {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: 0.3rem;
      text-shadow: 3px 3px 0px #ff0080, -2px -2px 0px #0080ff;
      animation: titleGlow 2s ease-in-out infinite alternate;
    }

    .site-title span:nth-child(1) { color: #ff0080; }
    .site-title span:nth-child(2) { color: #ffff00; }
    .site-title span:nth-child(3) { color: #00ff00; }
    .site-title span:nth-child(4) { color: #0080ff; }
    .site-title span:nth-child(5) { color: #ff6600; }
    .site-title span:nth-child(6) { color: #ff0080; }
    .site-title span:nth-child(7) { color: #ffff00; }

    @keyframes titleGlow {
      from { text-shadow: 2px 2px 0 #ff0080, -1px -1px 0 #0080ff; filter: brightness(1); }
      to   { text-shadow: 4px 4px 0 #ff0080, -2px -2px 0 #0080ff, 0 0 20px #ffff00; filter: brightness(1.2); }
    }

    .divider-stars {
      font-size: 0.7rem;
      color: #00ff00;
      letter-spacing: 6px;
      margin-bottom: 1rem;
      display: block;
    }

    /* Vibe label */
    .vibe-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: #ffff00;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 8px #ffff00;
    }

    /* Emoji box */
    .emoji-box {
      display: inline-block;
      font-size: 6rem;
      margin-bottom: 0.8rem;
      padding: 0.3rem 0.8rem;
      background: rgba(0,255,0,0.07);
      border: 3px solid #00ff00;
      box-shadow:
        0 0 10px #00ff00,
        0 0 30px rgba(0,255,0,0.3),
        inset 0 0 15px rgba(0,255,0,0.1);
      animation: emojiGlow 1.8s ease-in-out infinite alternate;
    }

    @keyframes emojiGlow {
      from { box-shadow: 0 0 8px #00ff00, 0 0 20px rgba(0,255,0,0.2), inset 0 0 10px rgba(0,255,0,0.05); border-color: #00ff00; }
      to   { box-shadow: 0 0 20px #00ff00, 0 0 50px rgba(0,255,0,0.5), inset 0 0 25px rgba(0,255,0,0.15); border-color: #ccff00; }
    }

    /* Condition name */
    .condition-name {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      line-height: 1.3;
    }

    .sub-label {
      font-size: 0.7rem;
      color: #ff6600;
      letter-spacing: 0.12em;
      margin-bottom: 1.4rem;
      text-shadow: 0 0 6px #ff6600;
    }

    /* Color blocks scale */
    .scale-row {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 1.4rem;
    }

    .block {
      width: 26px;
      height: 26px;
      border: 2px solid rgba(255,255,255,0.15);
      transition: all 0.3s ease;
    }

    .block.lit {
      border-color: rgba(255,255,255,0.6);
      transform: scaleY(1.3);
    }

    .block.half {
      border-color: rgba(255,255,255,0.6);
      transform: scaleY(1.3);
    }

    /* Block colors per position — red to green */
    .block:nth-child(1).lit  { background: #ff1a1a; box-shadow: 0 0 8px #ff1a1a; }
    .block:nth-child(2).lit  { background: #ff3d00; box-shadow: 0 0 8px #ff3d00; }
    .block:nth-child(3).lit  { background: #ff6600; box-shadow: 0 0 8px #ff6600; }
    .block:nth-child(4).lit  { background: #ff8800; box-shadow: 0 0 8px #ff8800; }
    .block:nth-child(5).lit  { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }
    .block:nth-child(6).lit  { background: #cccc00; box-shadow: 0 0 8px #cccc00; }
    .block:nth-child(7).lit  { background: #99cc00; box-shadow: 0 0 8px #99cc00; }
    .block:nth-child(8).lit  { background: #66cc00; box-shadow: 0 0 8px #66cc00; }
    .block:nth-child(9).lit  { background: #33bb00; box-shadow: 0 0 8px #33bb00; }
    .block:nth-child(10).lit { background: #00cc00; box-shadow: 0 0 8px #00cc00; }

    .block:not(.lit) { background: rgba(255,255,255,0.06); }

    /* Divider */
    .divider-line {
      color: #ff0080;
      font-size: 0.7rem;
      letter-spacing: 4px;
      margin: 1rem 0;
      text-shadow: 0 0 6px #ff0080;
    }

    /* Note */
    .note-box {
      border: 1px dashed #ff6600;
      padding: 0.7rem 1rem;
      margin-bottom: 1.2rem;
      border-radius: 3px;
      min-height: 2.4rem;
      background: rgba(255, 102, 0, 0.06);
    }

    .note-text {
      font-size: 0.72rem;
      font-weight: 400;
      color: #ffcc00;
      letter-spacing: 0.06em;
      line-height: 1.6;
      font-style: italic;
    }

    /* Footer visitor counter style */
    .footer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .visitor-label {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
    }

    .visitor-counter {
      font-size: 1rem;
      font-weight: 700;
      color: #00ff00;
      letter-spacing: 0.2em;
      text-shadow: 0 0 8px #00ff00;
      font-variant-numeric: tabular-nums;
    }

    .updated-row {
      font-size: 0.75rem;
      color: #ff6600;
      letter-spacing: 0.12em;
      margin-top: 8px;
      text-shadow: 0 0 8px #ff6600;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Marquee banner -->
  <div class="marquee-banner">
    <div class="marquee-inner" id="marqueeInner">
      <span class="marquee-text" id="marqueeText"></span>
    </div>
  </div>

  <div class="card-outer">
    <div class="card-border">
      <div class="card">

        <div class="site-title">
          <span>W</span><span>I</span><span>T</span><span>H</span><span>E</span><span>R</span><span> REPORT</span>
        </div>
        <span class="divider-stars">✦✦✦✦✦✦✦✦✦✦✦✦</span>

        <div class="vibe-label">⚡ AZMYTH'S CURRENT EXISTENTIAL MOOD: ⚡</div>

        <div class="emoji-box" id="mainEmoji">⛈️</div>

        <div class="condition-name" id="conditionName">LOADING</div>
        <div class="sub-label" id="subLabel">STANDBY...</div>

        <div class="scale-row" id="scaleRow"></div>

        <div class="divider-line">✦✦✦ ~ ~ ~ ✦✦✦ ~ ~ ~ ✦✦✦</div>

        <div class="note-box">
          <div class="note-text" id="noteText">no notes today...</div>
        </div>

        <div class="divider-line">✦✦✦ ~ ~ ~ ✦✦✦ ~ ~ ~ ✦✦✦</div>

        <div class="footer-block">
          <div class="visitor-label">VISITORS TODAY</div>
          <div class="visitor-counter" id="visitorCount">000000</div>
          <div class="updated-row" id="updatedRow">last updated: loading...</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const STATES = [
      { label: 'Death is not enough',                emoji: '⛈️',  sub: 'LEVEL 1', color: '#ff1a1a', level: 1  },
      { label: 'I am probably going to kill myself', emoji: '🌧️',  sub: 'LEVEL 2', color: '#ff3d00', level: 2  },
      { label: 'I am indifferent about living or dying', emoji: '🌦️', sub: 'LEVEL 3', color: '#ff6600', level: 3  },
      { label: 'Not super great tbh',                emoji: '🌥️',  sub: 'LEVEL 4', color: '#ff8800', level: 4  },
      { label: 'Everything is Mid',                  emoji: '☁️',   sub: 'LEVEL 5', color: '#ffaa00', level: 5  },
      { label: 'I might hang out with you I might not', emoji: '🌤️', sub: 'LEVEL 6', color: '#cccc00', level: 6  },
      { label: 'Moisturized and in my mf lane',      emoji: '🌈',   sub: 'LEVEL 7', color: '#99cc00', level: 7  },
      { label: "I'm probably manic rn",              emoji: '☀️',   sub: 'LEVEL 8', color: '#66cc00', level: 8  },
      { label: 'PUSSY POPPIN',                       emoji: '🌟',   sub: 'LEVEL 9', color: '#33bb00', level: 9  },
      { label: "I've ascended",                      emoji: '✨',   sub: 'LEVEL 10', color: '#00cc00', level: 10 },
    ];

    // Build scale blocks
    const scaleRow = document.getElementById('scaleRow');
    for (let i = 0; i < 10; i++) {
      const b = document.createElement('div');
      b.className = 'block';
      b.id = 'block-' + i;
      scaleRow.appendChild(b);
    }

    // Fake visitor counter
    const base = 1337 + Math.floor(Math.random() * 8888);
    document.getElementById('visitorCount').textContent = String(base).padStart(6, '0');

    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleString('en-US', {
        month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true
      });
    }

    fetch('mood.json?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const level = Math.max(1, Math.min(10, data.level || 6));
        const floorLevel = Math.floor(level);
        const isHalf = level !== floorLevel;
        const s = STATES[Math.ceil(level) - 1];

        document.getElementById('mainEmoji').textContent    = s.emoji;
        document.getElementById('conditionName').textContent = s.label;
        document.getElementById('conditionName').style.color = s.color;
        document.getElementById('conditionName').style.textShadow = `0 0 12px ${s.color}`;
        document.getElementById('subLabel').textContent     = s.sub;

        for (let i = 0; i < 10; i++) {
          const b = document.getElementById('block-' + i);
          b.style.background = '';
          b.style.boxShadow  = '';
          if (i < floorLevel) {
            b.className = 'block lit';
          } else if (isHalf && i === floorLevel) {
            b.className = 'block half';
            const c = STATES[i].color;
            b.style.background = `linear-gradient(to right, ${c} 50%, rgba(255,255,255,0.06) 50%)`;
            b.style.boxShadow  = `0 0 8px ${c}`;
          } else {
            b.className = 'block';
          }
        }

        const noteEl = document.getElementById('noteText');
        noteEl.textContent = data.note
          ? '> ' + data.note
          : 'no notes today...';

        const upd = document.getElementById('updatedRow');
        upd.textContent = data.updated
          ? 'last updated: ' + formatDate(data.updated)
          : 'last updated: unknown';
      })
      .catch(() => {
        document.getElementById('conditionName').textContent = '???';
        document.getElementById('subLabel').textContent      = 'ERROR: CANNOT CONNECT';
        document.getElementById('updatedRow').textContent    = 'connection failed';
      });
  // Marquee phrase cycler — rAF-based, no CSS animation dependency
  const MARQUEE_PHRASES = [
    "everything is fine",
    "i want to die",
    "The FitnessGram\u2122 Pacer Test is a multistage aerobic capacity test that progressively gets more difficult as it continues. The 20 meter pacer test will begin in 30 seconds. Line up at the start. The running speed starts slowly, but gets faster each minute after you hear this signal. A single lap should be completed each time you hear this sound. Remember to run in a straight line, and run as long as possible. The second time you fail to complete a lap before the sound, your test is over. The test will begin on the word start. On your mark, get ready, start.",
    "everything went downhill when harambe died",
    "i'm sorry if i don't respond",
    "everything feels like ass",
    "i should probably open a new business",
    "why doesn't anyone love me",
    "pls leave me alone i'm too popular",
  ];

  const PX_PER_SEC = 120;

  let marqueeIndex = 0;
  let currentX     = 0;
  let lastTime     = null;
  let rafId        = null;

  const marqueeInner = document.getElementById('marqueeInner');
  const marqueeText  = document.getElementById('marqueeText');

  // Kill any CSS animation on the element so rAF is in full control
  marqueeInner.style.animation = 'none';

  function startPhrase() {
    const phrase = MARQUEE_PHRASES[marqueeIndex % MARQUEE_PHRASES.length];
    marqueeIndex++;
    marqueeText.textContent = phrase;

    // Start from just off the right edge of the viewport
    currentX = window.innerWidth;
    lastTime = null;
    marqueeInner.style.transform = `translateX(${currentX}px)`;

    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(step);
  }

  function step(ts) {
    if (!lastTime) lastTime = ts;
    const dt = (ts - lastTime) / 1000;
    lastTime = ts;

    currentX -= PX_PER_SEC * dt;
    marqueeInner.style.transform = `translateX(${currentX}px)`;

    // Once the whole text has exited the left edge, start next phrase
    const textWidth = marqueeInner.offsetWidth;
    if (currentX < -textWidth) {
      startPhrase();
      return;
    }

    rafId = requestAnimationFrame(step);
  }

  startPhrase();
  </script>
</body>
</html>
